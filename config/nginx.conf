user  web;
pid   /run/nginx/nginx.pid;

worker_processes auto;
events { worker_connections 1024; }
http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  access_log    /dev/stdout;
  error_log     /dev/stderr;

  server {
    listen 8080;
    server_name _;
    root /var/www/public;

    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$args;
        add_header Cache-Control "no-store, private" always;
        include /etc/nginx/ga_inject.conf;
    }

    # Service worker: revalidate so cache version bumps are discovered.
    location = /sw.js {
        add_header Cache-Control "no-cache" always;
    }

    # Static assets are refreshed by the service worker cache version.
    location ~* \.(css|js|html|png|jpg|jpeg|svg|woff2)$ {
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Plain health ping
    location = /ping {
      include fastcgi_params;
      fastcgi_param SCRIPT_FILENAME $document_root/index.php;
      fastcgi_pass 127.0.0.1:9000;
    }

    # FPM status (human/json)
    location = /fpm_status {
      include fastcgi_params;
      fastcgi_param SCRIPT_FILENAME $document_root/index.php;
      fastcgi_pass 127.0.0.1:9000;
    }


    location ~ \.php$ {
        try_files $uri =404;
        
        add_header Cache-Control "no-store, private" always;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;

        include /etc/nginx/ga_inject.conf;
    }
  }
}
