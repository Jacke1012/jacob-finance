name: Composer Audit

on:
  push:
    branches: [ "**" ]
    paths:
      - "app/composer.json"
      - "app/composer.lock"
      - ".github/workflows/composer-audit.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "app/composer.json"
      - "app/composer.lock"
      - ".github/workflows/composer-audit.yml"
  workflow_dispatch:
  schedule:
    - cron: "00 08 * * *"

permissions:
  contents: read

jobs:
  audit:
    name: Audit Composer dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        with:
          coverage: none
          tools: composer:v2

      - name: Run Composer audit
        working-directory: app
        run: |
          set +e
          composer audit --format=json > composer-audit.json
          status=$?

          if [ "$status" -eq 1 ]; then
            echo "Composer audit found advisories; uploading SARIF results."
            exit 0
          fi

          exit "$status"

      - name: Convert Composer audit to SARIF
        working-directory: app
        run: |
          php -r '
          $input = json_decode(file_get_contents("composer-audit.json"), true) ?: [];
          $advisories = $input["advisories"] ?? [];
          $rules = [];
          $results = [];

          $levelForSeverity = static function (?string $severity): string {
              return match (strtolower($severity ?? "")) {
                  "critical", "high" => "error",
                  "medium" => "warning",
                  default => "note",
              };
          };

          $scoreForSeverity = static function (?string $severity): ?string {
              return match (strtolower($severity ?? "")) {
                  "critical" => "9.0",
                  "high" => "7.0",
                  "medium" => "5.0",
                  "low" => "3.0",
                  default => null,
              };
          };

          foreach ($advisories as $package => $items) {
              foreach ($items as $item) {
                  $id = $item["advisoryId"] ?? $item["cve"] ?? ($package . ":composer-audit");
                  $severity = $item["severity"] ?? null;
                  $title = $item["title"] ?? "Composer advisory for " . $package;
                  $link = $item["link"] ?? null;
                  $affected = $item["affectedVersions"] ?? null;
                  $message = $title;

                  if ($affected) {
                      $message .= " Affected versions: " . $affected . ".";
                  }

                  if ($link) {
                      $message .= " More info: " . $link;
                  }

                  $rules[$id] = [
                      "id" => $id,
                      "name" => $package,
                      "shortDescription" => ["text" => $title],
                      "fullDescription" => ["text" => $message],
                      "properties" => array_filter([
                          "security-severity" => $scoreForSeverity($severity),
                          "tags" => ["security", "composer", "dependency"],
                      ]),
                  ];

                  $results[] = [
                      "ruleId" => $id,
                      "level" => $levelForSeverity($severity),
                      "message" => ["text" => $message],
                      "locations" => [[
                          "physicalLocation" => [
                              "artifactLocation" => ["uri" => "app/composer.lock"],
                              "region" => ["startLine" => 1],
                          ],
                      ]],
                      "properties" => array_filter([
                          "package" => $package,
                          "severity" => $severity,
                          "cve" => $item["cve"] ?? null,
                      ]),
                  ];
              }
          }

          $sarif = [
              "version" => "2.1.0",
              "\$schema" => "https://json.schemastore.org/sarif-2.1.0.json",
              "runs" => [[
                  "tool" => [
                      "driver" => [
                          "name" => "Composer Audit",
                          "informationUri" => "https://getcomposer.org/doc/03-cli.md#audit",
                          "rules" => array_values($rules),
                      ],
                  ],
                  "results" => $results,
              ]],
          ];

          file_put_contents("composer-audit.sarif", json_encode($sarif, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES));
          '

      - name: Upload Composer audit results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: app/composer-audit.sarif
          category: composer-audit
