# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Trivy

on:
  push:
    branches: [ "**" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '00 08 * * *'

permissions:
  contents: read

jobs:
  repository:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: Scan repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run Trivy repository scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-repository-results.sarif
          scanners: vuln,secret,misconfig
          vuln-type: os,library
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL

      - name: Upload Trivy repository results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-repository-results.sarif
          category: trivy-repository

  images:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule'
      }}
    permissions:
      contents: read
      packages: read # for scanning GHCR images with GITHUB_TOKEN
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: Scan published GHCR images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ghcr-app
            tag: app
          - name: ghcr-landing
            tag: landing
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy image scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/jacke1012/finance:${{ matrix.tag }}
          format: sarif
          output: trivy-${{ matrix.name }}-image-results.sarif
          scanners: vuln,secret,misconfig
          vuln-type: os,library
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL

      - name: Upload Trivy ${{ matrix.name }} image results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.name }}-image-results.sarif
          category: trivy-${{ matrix.name }}-image
