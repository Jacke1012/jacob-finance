name: Build & Push app + landing docker

on:
  push:
    branches: [ "main" ]
    tags: [ "v*", "release-*" ]
  workflow_dispatch:    

env:
  IMAGE_BASE: finance   # <--- your base image name (repo path after your username)

jobs:
  docker:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          # --- image 1: app ---
          - name: app
            tag: app
            context: .
            file: ./Dockerfile          # adjust if your file is named differently
          # --- image 2: landing ---
          - name: landing
            tag: landing
            context: ./landing              # adjust to the folder you build from
            file: ./landing/Dockerfile      # adjust if needed

    steps:
      - uses: actions/checkout@v6

      #Only needed for multi aritecture builds
      #- uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push (${{ matrix.name }})
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_BASE }}:${{ matrix.tag }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  rollout:
    name: Trigger k3s rollout
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'

    steps:
      - name: Call rollout webhook
        env:
          K3S_WEBHOOK_URL: ${{ secrets.K3S_WEBHOOK_URL }}
          K3S_WEBHOOK_TOKEN: ${{ secrets.K3S_WEBHOOK_TOKEN }}
          K3S_NAMESPACE: ${{ secrets.K3S_NAMESPACE }}
          K3S_DEPLOYMENTS: ${{ secrets.K3S_DEPLOYMENTS }}
        run: |
          set -euo pipefail

          if [ -z "${K3S_WEBHOOK_URL}" ]; then
            echo "K3S_WEBHOOK_URL secret is not set."
            exit 1
          fi

          curl --fail --show-error --silent \
            --request POST "${K3S_WEBHOOK_URL}" \
            --header "Authorization: Bearer ${K3S_WEBHOOK_TOKEN}" \
            --header "Content-Type: application/json" \
            --data @- <<JSON
          {
            "repository": "${GITHUB_REPOSITORY}",
            "ref": "${GITHUB_REF_NAME}",
            "sha": "${GITHUB_SHA}",
            "namespace": "${K3S_NAMESPACE}",
            "deployments": "${K3S_DEPLOYMENTS}",
            "images": [
              "docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_BASE }}:app",
              "docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_BASE }}:landing"
            ]
          }
          JSON
